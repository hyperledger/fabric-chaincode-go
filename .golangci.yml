# See https://golangci-lint.run/usage/configuration/
version: "2"
run:
  timeout: 5m
  concurrency: 4
  go: "1.25"

linters:
  default: none
  enable:
    - gosec
    - staticcheck
    - govet
    - ineffassign
    - misspell
    - unused
  settings:
    gosec:
      excludes:
        - G115 # safe to exclude type conversion overflow checks in this repository since the integer values will always be low
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports